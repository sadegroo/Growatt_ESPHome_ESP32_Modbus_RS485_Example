  # ── Priority readback ─────────────────────────────────────────────────
  - platform: modbus_controller
    modbus_controller_id: modbus_pv
    name: "Growatt Priority Raw"
    id: priority_raw
    register_type: read
    address: 2118
    value_type: U_WORD
    entity_category: diagnostic
    icon: mdi:priority-high

  # ── TL-XH time slot readback (decoded) ────────────────────────────────
  - platform: modbus_controller
    modbus_controller_id: modbus_pv
    name: "Growatt TimeSlot1 Reg3038 Raw"
    id: reg3038_raw
    register_type: holding
    address: 3038
    value_type: U_WORD
    entity_category: diagnostic

  - platform: modbus_controller
    modbus_controller_id: modbus_pv
    name: "Growatt TimeSlot1 Reg3039 Raw"
    id: reg3039_raw
    register_type: holding
    address: 3039
    value_type: U_WORD
    entity_category: diagnostic

  - platform: template
    name: "Growatt TimeSlot1 Readback StartHour"
    lambda: |-
      if (id(reg3038_raw).has_state())
        return (float)(((int)id(reg3038_raw).state >> 8) & 0x1F);
      return {};
    entity_category: diagnostic
    update_interval: 30s

  - platform: template
    name: "Growatt TimeSlot1 Readback StartMin"
    lambda: |-
      if (id(reg3038_raw).has_state())
        return (float)((int)id(reg3038_raw).state & 0xFF);
      return {};
    entity_category: diagnostic
    update_interval: 30s

  - platform: template
    name: "Growatt TimeSlot1 Readback EndHour"
    lambda: |-
      if (id(reg3039_raw).has_state())
        return (float)(((int)id(reg3039_raw).state >> 8) & 0x1F);
      return {};
    entity_category: diagnostic
    update_interval: 30s

  - platform: template
    name: "Growatt TimeSlot1 Readback EndMin"
    lambda: |-
      if (id(reg3039_raw).has_state())
        return (float)((int)id(reg3039_raw).state & 0xFF);
      return {};
    entity_category: diagnostic
    update_interval: 30s

  - platform: template
    name: "Growatt TimeSlot1 Readback Enabled"
    lambda: |-
      if (id(reg3038_raw).has_state())
        return (float)(((int)id(reg3038_raw).state >> 15) & 1);
      return {};
    entity_category: diagnostic
    update_interval: 30s

  - platform: template
    name: "Growatt TimeSlot1 Readback Priority"
    lambda: |-
      if (id(reg3038_raw).has_state())
        return (float)(((int)id(reg3038_raw).state >> 13) & 0x03);
      return {};
    entity_category: diagnostic
    update_interval: 30s
    # 0=load first, 1=battery first, 2=grid first

text_sensor:
  - platform: modbus_controller
    modbus_controller_id: modbus_pv
    name: "Growatt Inverter Status"
    address: 0
    register_type: "read"
    raw_encode: HEXBYTES
    lambda: |-
      uint16_t value = modbus_controller::word_from_hex_str(x, 0);
      switch (value) {
        case 0: return std::string("Waiting");
        case 1: return std::string("Normal");
        case 3: return std::string("Fault");
        default: return std::string("Unknown");
      }
    icon: mdi:information

  - platform: template
    name: "Growatt Priority"
    lambda: |-
      if (id(priority_raw).has_state()) {
        int val = (int)id(priority_raw).state;
        switch (val) {
          case 0: return std::string("Load First");
          case 1: return std::string("Battery First");
          case 2: return std::string("Grid First");
          default: return std::string("Unknown");
        }
      }
      return std::string("waiting...");
    update_interval: 30s
    icon: mdi:priority-high
